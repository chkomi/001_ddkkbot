<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 로봇 몸통 -->
  <rect x="22" y="38" width="56" height="42" rx="10" ry="10" fill="#2D2D2D"/>

  <!-- 로봇 머리 -->
  <rect x="30" y="14" width="40" height="30" rx="8" ry="8" fill="#2D2D2D"/>

  <!-- 안테나 -->
  <line x1="50" y1="14" x2="50" y2="6" stroke="#2D2D2D" stroke-width="3" stroke-linecap="round"/>
  <circle cx="50" cy="4" r="3" fill="#FF4444"/>

  <!-- 눈 (클릭 버튼 느낌) -->
  <rect x="34" y="21" width="12" height="10" rx="3" fill="#4ECDC4"/>
  <rect x="54" y="21" width="12" height="10" rx="3" fill="#4ECDC4"/>

  <!-- 눈 하이라이트 -->
  <rect x="36" y="23" width="4" height="3" rx="1" fill="white" opacity="0.7"/>
  <rect x="56" y="23" width="4" height="3" rx="1" fill="white" opacity="0.7"/>

  <!-- 입 (클릭음 표현 - 작은 점선) -->
  <path d="M38 53 Q50 60 62 53" stroke="#4ECDC4" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- 몸통 패널 -->
  <rect x="32" y="63" width="36" height="10" rx="4" fill="#1a1a1a"/>

  <!-- 패널 버튼 3개 -->
  <circle cx="41" cy="68" r="3" fill="#FF4444"/>
  <circle cx="50" cy="68" r="3" fill="#FFD93D"/>
  <circle cx="59" cy="68" r="3" fill="#4ECDC4"/>

  <!-- 딸깍 커서 (오른쪽 하단 오버레이) -->
  <g transform="translate(58, 58)">
    <!-- 커서 포인터 -->
    <polygon points="0,0 0,18 5,14 8,20 11,19 8,13 14,13" fill="white" stroke="#2D2D2D" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- 클릭 반짝임 -->
    <line x1="17" y1="2" x2="21" y2="-2" stroke="#FFD93D" stroke-width="2" stroke-linecap="round"/>
    <line x1="19" y1="7" x2="24" y2="7" stroke="#FFD93D" stroke-width="2" stroke-linecap="round"/>
    <line x1="17" y1="12" x2="21" y2="16" stroke="#FFD93D" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
